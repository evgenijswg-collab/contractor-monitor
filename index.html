<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг контрагентов</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        :root {
            --bg: #f5f6f8;
            --white: #ffffff;
            --border: #e2e5eb;
            --text: #1a1a1a;
            --text-secondary: #6b7280;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --success-bg: #ecfdf5;
            --warning-bg: #fffbeb;
            --danger-bg: #fef2f2;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            font-size: 14px;
        }
        
        /* Шапка */
        .header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        .header-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: 8px;
        }
        
        /* Кнопки */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
            font-family: inherit;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .btn-secondary {
            background: var(--white);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: #f9fafb; }
        
        .btn-danger {
            background: none;
            color: var(--danger);
            border: 1px solid transparent;
        }
        .btn-danger:hover { background: var(--danger-bg); }
        
        /* Основной контент */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }
        
        /* Карточки */
        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .card-body {
            padding: 20px;
        }
        
        /* Сетка */
        .grid { display: grid; gap: 24px; }
        .grid-2 { grid-template-columns: 340px 1fr; }
        
        /* Инпуты */
        .input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }
        .input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        
        .input-group {
            display: flex;
            gap: 8px;
        }
        
        /* Таблицы */
        .table-wrap {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        
        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        
        tr:hover td { background: #fafbfc; }
        
        /* Бейджи статусов */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-ok { background: var(--success-bg); color: var(--success); }
        .badge-warn { background: var(--warning-bg); color: var(--warning); }
        .badge-danger { background: var(--danger-bg); color: var(--danger); }
        
        /* Индикаторы */
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .dot-ok { background: var(--success); }
        .dot-warn { background: var(--warning); }
        .dot-danger { background: var(--danger); }
        
        /* Аномалии */
        .anomaly-item {
            padding: 12px 16px;
            border-left: 3px solid;
            margin-bottom: 8px;
            background: #fafbfc;
            border-radius: 0 6px 6px 0;
        }
        
        .anomaly-risk { border-left-color: var(--warning); }
        .anomaly-debt { border-left-color: var(--danger); }
        .anomaly-bankrupt { border-left-color: #991b1b; background: #fef2f2; }
        
        .anomaly-date {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        
        .anomaly-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }
        
        .anomaly-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        /* Счётчики в шапке */
        .stat {
            text-align: center;
            padding: 0 16px;
            border-left: 1px solid var(--border);
        }
        .stat:first-child { border-left: none; }
        .stat-value { font-size: 20px; font-weight: 700; }
        .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .stat-danger { color: var(--danger); }
        .stat-warning { color: var(--warning); }
        
        /* Сообщение о добавлении */
        .toast {
            font-size: 12px;
            color: var(--success);
            margin-top: 8px;
            font-weight: 500;
        }
        
        /* Пустое состояние */
        .empty {
            text-align: center;
            padding: 32px;
            color: var(--text-secondary);
            font-size: 13px;
        }
    </style>
</head>
<body x-data="app()" x-init="init()">
    
    <!-- Шапка -->
    <header class="header">
        <div style="display: flex; align-items: baseline;">
            <span class="header-title">Мониторинг контрагентов</span>
            <span class="header-subtitle">v1.0</span>
        </div>
        
        <div style="display: flex; align-items: center; gap: 0;">
            <div class="stat">
                <div class="stat-value" x-text="contractors.length">0</div>
                <div class="stat-label">на наблюдении</div>
            </div>
            <div class="stat">
                <div class="stat-value stat-warning" x-text="highRiskCount()">0</div>
                <div class="stat-label">высокий риск</div>
            </div>
            <div class="stat">
                <div class="stat-value stat-danger" x-text="anomalies.length">0</div>
                <div class="stat-label">аномалий</div>
            </div>
        </div>
        
        <button class="btn btn-primary" @click="checkAll()" 
                :disabled="isChecking || contractors.length === 0">
            Запустить проверку
        </button>
    </header>
    
    <!-- Основной контент -->
    <main class="main">
        <div class="grid grid-2">
            
            <!-- ЛЕВАЯ КОЛОНКА -->
            <div style="display: flex; flex-direction: column; gap: 24px;">
                
                <!-- Добавление ИНН -->
                <div class="card">
                    <div class="card-header">Добавить контрагента</div>
                    <div class="card-body">
                        <div class="input-group">
                            <input type="text" 
                                   class="input" 
                                   x-model="newInn" 
                                   @keyup.enter="addContractor()"
                                   placeholder="ИНН (10 или 12 цифр)"
                                   maxlength="12">
                            <button class="btn btn-primary" @click="addContractor()"
                                    :disabled="!newInn || newInn.length < 10">
                                Добавить
                            </button>
                        </div>
                        <div class="toast" x-show="lastAdded" x-text="lastAdded"></div>
                    </div>
                </div>
                
                <!-- Действия -->
                <div class="card">
                    <div class="card-header">Действия</div>
                    <div class="card-body" style="display: flex; flex-direction: column; gap: 8px;">
                        <button class="btn btn-secondary" @click="addDemoData()">
                            Загрузить демо-данные
                        </button>
                        <button class="btn btn-danger" @click="clearAll()">
                            Очистить все данные
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- ПРАВАЯ КОЛОНКА -->
            <div style="display: flex; flex-direction: column; gap: 24px;">
                
                <!-- Таблица контрагентов -->
                <div class="card">
                    <div class="card-header">
                        Контрагенты
                        <span style="font-weight: 400; color: var(--text-secondary); font-size: 13px;" 
                              x-text="contractors.length + ' записей'"></span>
                    </div>
                    
                    <div class="table-wrap" x-show="contractors.length > 0">
                        <table>
                            <thead>
                                <tr>
                                    <th>ИНН</th>
                                    <th>Наименование</th>
                                    <th>Риск</th>
                                    <th>Статус</th>
                                    <th>Задолженность</th>
                                    <th>Суды</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(c, idx) in contractors" :key="c.inn">
                                    <tr>
                                        <td style="font-family: monospace; font-size: 13px;" x-text="c.inn"></td>
                                        <td x-text="c.name || '—'"></td>
                                        <td>
                                            <span x-show="c.risk" class="badge" 
                                                  :class="c.risk < 30 ? 'badge-ok' : c.risk < 60 ? 'badge-warn' : 'badge-danger'"
                                                  x-text="c.risk + '/100'"></span>
                                            <span x-show="!c.risk" style="color: var(--text-secondary);">—</span>
                                        </td>
                                        <td>
                                            <span x-show="c.status">
                                                <span class="dot" :class="c.status === 'OK' ? 'dot-ok' : c.status === 'WARNING' ? 'dot-warn' : 'dot-danger'"></span>
                                                <span x-text="c.status === 'OK' ? 'OK' : c.status === 'WARNING' ? 'Внимание' : 'Опасно'"></span>
                                            </span>
                                            <span x-show="!c.status" style="color: var(--text-secondary);">—</span>
                                        </td>
                                        <td x-text="c.fssp_debt ? c.fssp_debt.toLocaleString() + ' ₽' : '—'"></td>
                                        <td x-text="c.court_cases || '—'"></td>
                                        <td>
                                            <button class="btn btn-danger" style="padding: 4px 8px; font-size: 12px;" 
                                                    @click="removeContractor(idx)">Удалить</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="empty" x-show="contractors.length === 0">
                        Нет контрагентов. Добавьте первый ИНН слева.
                    </div>
                </div>
                
                <!-- Аномалии -->
                <div class="card">
                    <div class="card-header">
                        Обнаруженные аномалии
                        <span style="font-weight: 400; color: var(--text-secondary); font-size: 13px;" 
                              x-show="anomalies.length > 0" x-text="anomalies.length + ' записей'"></span>
                    </div>
                    
                    <div class="card-body" x-show="anomalies.length > 0" style="padding: 12px 20px;">
                        <template x-for="a in anomalies.slice().reverse()" :key="a.date + a.inn">
                            <div class="anomaly-item" 
                                 :class="a.type === 'BANKRUPTCY' ? 'anomaly-bankrupt' : a.type.includes('DEBT') ? 'anomaly-debt' : 'anomaly-risk'">
                                <div class="anomaly-date" x-text="a.date"></div>
                                <div class="anomaly-name" x-text="a.inn + ' — ' + a.name"></div>
                                <div class="anomaly-desc" x-text="a.description"></div>
                            </div>
                        </template>
                    </div>
                    
                    <div class="empty" x-show="anomalies.length === 0">
                        Аномалий не обнаружено.
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        function app() {
            return {
                newInn: '',
                lastAdded: '',
                contractors: [],
                anomalies: [],
                isChecking: false,
                
                init() {
                    const saved = localStorage.getItem('contractor_data');
                    if (saved) {
                        const data = JSON.parse(saved);
                        this.contractors = data.contractors || [];
                        this.anomalies = data.anomalies || [];
                    }
                },
                
                save() {
                    localStorage.setItem('contractor_data', JSON.stringify({
                        contractors: this.contractors,
                        anomalies: this.anomalies
                    }));
                },
                
                addContractor() {
                    const inn = this.newInn.trim();
                    if (!inn || inn.length < 10) return;
                    
                    if (this.contractors.find(c => c.inn === inn)) {
                        this.lastAdded = 'Этот ИНН уже в списке';
                        return;
                    }
                    
                    const name = this.getCompanyName(inn);
                    
                    this.contractors.push({
                        inn, name,
                        risk: null, status: null, fssp_debt: null,
                        court_cases: null, added: new Date().toISOString()
                    });
                    
                    this.lastAdded = `Добавлен: ${name}`;
                    this.newInn = '';
                    this.save();
                },
                
                getCompanyName(inn) {
                    const demo = {
                        '7736207543': 'ООО Яндекс',
                        '7707270050': 'ООО Сбербанк-Сервис',
                        '7707083893': 'ПАО Сбербанк',
                        '5029255630': 'ООО Рога и Копыта',
                        '1234567890': 'ООО Однодневка',
                    };
                    if (demo[inn]) return demo[inn];
                    return 'Контрагент ' + inn.slice(-4);
                },
                
                removeContractor(idx) {
                    this.contractors.splice(idx, 1);
                    this.save();
                },
                
                async checkAll() {
                    if (this.isChecking || this.contractors.length === 0) return;
                    this.isChecking = true;
                    
                    for (let i = 0; i < this.contractors.length; i++) {
                        await this.sleep(300 + Math.random() * 500);
                        
                        const prevRisk = this.contractors[i].risk;
                        const prevDebt = this.contractors[i].fssp_debt || 0;
                        const prevCases = this.contractors[i].court_cases || 0;
                        
                        const check = this.simulateCheck(this.contractors[i].inn);
                        
                        this.contractors[i].risk = check.risk;
                        this.contractors[i].status = check.status;
                        this.contractors[i].fssp_debt = check.fssp_debt;
                        this.contractors[i].court_cases = check.court_cases;
                        this.contractors[i].last_check = new Date().toISOString();
                        
                        this.detectAnomalies(this.contractors[i], prevRisk, prevDebt, prevCases, check);
                    }
                    
                    this.isChecking = false;
                    this.save();
                },
                
                simulateCheck(inn) {
                    const seed = inn.split('').reduce((a, b) => a + parseInt(b), 0);
                    const rng = (min, max) => Math.floor(((seed * 137 + Date.now() % 1000) % 100) / 100 * (max - min) + min);
                    
                    const fssp_debt = rng(0, 100) < 20 ? rng(50000, 2000000) : 0;
                    const court_cases = rng(0, 15);
                    const is_bankrupt = rng(0, 100) < 2;
                    
                    let risk = rng(0, 15);
                    if (fssp_debt > 500000) risk += 30;
                    else if (fssp_debt > 0) risk += 15;
                    if (court_cases > 8) risk += 25;
                    else if (court_cases > 3) risk += 10;
                    if (is_bankrupt) risk += 50;
                    risk = Math.min(100, Math.max(1, risk));
                    
                    return { risk, status: risk < 30 ? 'OK' : risk < 60 ? 'WARNING' : 'DANGER', fssp_debt, court_cases, is_bankrupt };
                },
                
                detectAnomalies(c, prevRisk, prevDebt, prevCases, current) {
                    if (prevRisk !== null && current.risk - prevRisk >= 20) {
                        this.addAnomaly(c, 'RISK_SPIKE', `Риск вырос с ${prevRisk} до ${current.risk}`, prevRisk, current.risk);
                    }
                    if (prevDebt === 0 && current.fssp_debt > 0) {
                        this.addAnomaly(c, 'NEW_DEBT', 'Появилась задолженность ФССП', '0 ₽', current.fssp_debt.toLocaleString() + ' ₽');
                    }
                    if (prevDebt > 0 && current.fssp_debt >= prevDebt * 3) {
                        this.addAnomaly(c, 'DEBT_SPIKE', `Задолженность выросла в ${Math.round(current.fssp_debt / prevDebt)} раз`, prevDebt.toLocaleString() + ' ₽', current.fssp_debt.toLocaleString() + ' ₽');
                    }
                    if (current.is_bankrupt && prevRisk !== null) {
                        this.addAnomaly(c, 'BANKRUPTCY', 'Начата процедура банкротства', 'Нет', 'Да');
                    }
                    if (prevCases > 0 && current.court_cases >= prevCases + 5) {
                        this.addAnomaly(c, 'COURT_SPIKE', `Рост судебных дел на +${current.court_cases - prevCases}`, prevCases, current.court_cases);
                    }
                },
                
                addAnomaly(c, type, description, oldVal, newVal) {
                    this.anomalies.push({
                        date: new Date().toLocaleString('ru-RU'),
                        inn: c.inn, name: c.name, type, description,
                        old_value: String(oldVal), new_value: String(newVal)
                    });
                },
                
                highRiskCount() { return this.contractors.filter(c => c.risk && c.risk >= 60).length; },
                
                addDemoData() {
                    ['7736207543', '7707270050', '5029255630', '1234567890'].forEach(inn => {
                        if (!this.contractors.find(c => c.inn === inn)) {
                            this.newInn = inn; this.addContractor();
                        }
                    });
                    this.lastAdded = 'Демо-данные загружены';
                },
                
                clearAll() {
                    if (confirm('Удалить все данные?')) {
                        this.contractors = []; this.anomalies = [];
                        localStorage.removeItem('contractor_data');
                    }
                },
                
                sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
            }
        }
    </script>
</body>
</html>
